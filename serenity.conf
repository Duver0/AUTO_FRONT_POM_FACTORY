serenity {
  project.name = "AUTO_FRONT_POM_FACTORY"
  take.screenshots = AFTER_EACH_STEP
}

webdriver {
  base.url = "http://localhost:3001/"
  driver = chrome
  autodownload = true
  capabilities {
    browserName = "chrome"
    "goog:chromeOptions" {
      args = ["--headless", "--no-sandbox", "--disable-dev-shm-usage", "--disable-gpu"]
    }
  }
}

environments {
  default {
    webdriver.base.url = "http://localhost:3001/"
  }
}
